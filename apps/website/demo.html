<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Alpha | Live Demo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .demo-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        .demo-config {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 8px;
        }
        .demo-preview {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .preview-box {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .preview-header {
            background: var(--bg-elevated);
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }
        .preview-body {
            padding: 1.5rem;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-primary);
            overflow-x: auto;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent-blue);
            margin-bottom: 0.5rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 0.75rem;
            color: #fff;
            font-family: var(--font-mono);
            outline: none;
        }
        .form-group input:focus { border-color: var(--accent); }
        
        .badge-preview {
            background: rgba(245, 176, 65, 0.1);
            color: var(--accent);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 800;
            margin-bottom: 1rem;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="hex-grid"></div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i data-lucide="shield-alert" class="text-accent"></i>
                <span>BEEZ_SHIELD <span class="mono" style="color: var(--accent-blue); font-size: 0.7em;">LIVE_DEMO</span></span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="https://github.com/chox-cell/Sentinel-Alpha" class="nav-link" target="_blank">GitHub</a>
                <a href="https://8004scan.io/agents/base/45967" class="nav-link" target="_blank">8004scan</a>
            </div>
            <div class="nav-actions">
                <button id="themeToggle" class="theme-toggle">
                    <i data-lucide="sun" class="icon-sun"></i>
                    <i data-lucide="moon" class="icon-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container" style="padding-top: 8rem;">
        <div class="section-header">
            <div class="badge-preview">DEVELOPER_PREVIEW_ACTIVE</div>
            <h1 class="hero-title">Sentinel Alpha <span class="text-accent">Live Demo</span></h1>
            <p class="section-desc">Generate API previews and test the execution fidelity responses for your autonomous agents.</p>
        </div>

        <div class="demo-layout">
            <aside class="demo-config">
                <div class="form-group">
                    <label>Contract_Address</label>
                    <input type="text" id="demoAddress" value="0x1111111111111111111111111111111111111111">
                </div>
                
                <div class="form-group">
                    <label>Network_Chain</label>
                    <select id="demoChain">
                        <option value="base">Base Mainnet (Default)</option>
                        <option value="ethereum">Ethereum (Experimental)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Sentinel_Lane</label>
                    <select id="demoLane">
                        <option value="basic">basic (0.02 USDC)</option>
                        <option value="executive">executive (0.05 USDC)</option>
                        <option value="premium">premium (0.10 USDC)</option>
                        <option value="priority">priority (0.15 USDC)</option>
                    </select>
                </div>
                
                <button id="genPreview" class="btn btn-primary" style="width: 100%;">Generate API Preview</button>
            </aside>

            <div class="demo-preview">
                <div class="preview-box">
                    <div class="preview-header">
                        <span>CURL_REQUEST</span>
                        <i data-lucide="terminal"></i>
                    </div>
                    <div class="preview-body" id="curlOutput">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="preview-box">
                    <div class="preview-header">
                        <span>EXPECTED_RESPONSE_JSON</span>
                        <i data-lucide="code"></i>
                    </div>
                    <div class="preview-body" id="jsonOutput">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer" style="margin-top: 4rem;">
        <div class="container footer-bottom">
            <div>&copy; 2026 BeezShield // Demo_Environment</div>
            <div class="mono" style="font-size: 0.7rem;">STATUS: <span class="text-accent">READY</span></div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const genBtn = document.getElementById('genPreview');
            const curlOut = document.getElementById('curlOutput');
            const jsonOut = document.getElementById('jsonOutput');
            
            const updatePreview = () => {
                const addr = document.getElementById('demoAddress').value;
                const chain = document.getElementById('demoChain').value;
                const lane = document.getElementById('demoLane').value;
                
                const curl = `curl -X POST "https://api.beezshield.com/contracts/risk-score" \\\n  -H "Content-Type: application/json" \\\n  -H "X402-PAYMENT: tx:YOUR_TX_HASH" \\\n  -H "X-SENTINEL-LANE: ${lane}" \\\n  -d '{"contract_address":"${addr}","chain":"${chain}"}'`;
                
                const response = {
                    "contract": addr,
                    "chain": chain,
                    "risk_score": 12,
                    "confidence": 0.98,
                    "action": "PROCEED",
                    "emergency_signal": false,
                    "attestation": "0xSIGNED_HASH_BY_SENTINEL_ALPHA_45967",
                    "timestamp": new Date().toISOString()
                };

                curlOut.innerHTML = `<pre style="margin:0;"><code>${curl}</code></pre>`;
                jsonOut.innerHTML = `<pre style="margin:0;"><code>${JSON.stringify(response, null, 2)}</code></pre>`;
                
                // Add a little forensic flair
                console.log(`[SYS] PREVIEW_GENERATED for ${addr}`);
            };

            genBtn.addEventListener('click', updatePreview);
            updatePreview(); // Initial load
        });
    </script>
</body>
</html>
